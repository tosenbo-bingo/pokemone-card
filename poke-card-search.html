<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ポケカ英語版サーチャー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12131c;
    --bg-2: #191b28;
    --surface: #1f2233;
    --surface-2: #262a3f;
    --gold: #f0b429;
    --gold-soft: #f7d488;
    --red: #e6483a;
    --text: #f4f2ea;
    --muted: #9198b3;
    --line: #33374f;
  }
  *{ box-sizing: border-box; }
  html,body{
    margin:0; padding:0;
    background: radial-gradient(circle at 20% -10%, #232744 0%, var(--bg) 55%);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }
  .wrap{
    max-width: 640px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  header{
    text-align: center;
    margin-bottom: 34px;
  }
  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-size: 12px;
    letter-spacing: 0.14em;
    color: var(--gold-soft);
    background: rgba(240,180,41,0.08);
    border: 1px solid rgba(240,180,41,0.35);
    padding: 5px 12px;
    border-radius: 999px;
    margin-bottom: 16px;
  }
  .ball{
    width:10px; height:10px; border-radius:50%;
    background: linear-gradient(180deg, var(--red) 50%, #fff 50%);
    border: 1.5px solid #0b0c12;
    flex: none;
  }
  h1{
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 30px;
    line-height: 1.35;
    margin: 0 0 10px;
    background: linear-gradient(100deg, var(--gold-soft), #fff 40%, var(--gold-soft));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p.lead{
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
    margin: 0 auto;
    max-width: 460px;
  }
  .panel{
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
    margin-bottom: 18px;
  }
  label{
    display:block;
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }
  .search-row{
    display:flex;
    gap: 10px;
  }
  input[type="text"]{
    flex: 1;
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 17px;
    font-family: 'Noto Sans JP', sans-serif;
    padding: 13px 14px;
    border-radius: 12px;
    outline: none;
    min-width: 0;
  }
  input[type="text"]:focus{
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(240,180,41,0.18);
  }
  button{
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    cursor: pointer;
    border: none;
    border-radius: 12px;
    font-size: 15px;
  }
  .btn-primary{
    background: linear-gradient(180deg, var(--gold-soft), var(--gold));
    color: #241a03;
    padding: 0 22px;
    flex: none;
  }
  .btn-primary:disabled{ opacity: 0.6; cursor: default; }
  .btn-primary:focus-visible, .btn-secondary:focus-visible, .chip:focus-visible{
    outline: 2px solid var(--gold-soft);
    outline-offset: 2px;
  }
  .chips{
    display:flex; flex-wrap: wrap; gap: 8px; margin-top: 14px;
  }
  .chip{
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--muted);
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 999px;
  }
  .chip:hover{ border-color: var(--gold); color: var(--gold-soft); }

  /* Result card, styled like a foil card */
  .result{
    position: relative;
    border-radius: 18px;
    padding: 2px;
    background: linear-gradient(120deg, #3a3f5c, var(--gold), #3a3f5c 60%);
    background-size: 220% 220%;
    display: none;
    margin-bottom: 18px;
  }
  .result.show{ display:block; animation: sweep 2.6s ease-in-out infinite; }
  @keyframes sweep{
    0%{ background-position: 0% 50%; }
    50%{ background-position: 100% 50%; }
    100%{ background-position: 0% 50%; }
  }
  .result-inner{
    background: var(--surface-2);
    border-radius: 16px;
    padding: 22px;
  }
  .result-row{
    display:flex; align-items:center; justify-content: space-between; gap: 14px; flex-wrap: wrap;
  }
  .lang-tag{
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    margin-bottom: 4px;
  }
  .ja-name{
    font-size: 15px;
    color: var(--muted);
  }
  .arrow{ color: var(--gold-soft); font-size: 20px; }
  .en-name{
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 900;
    font-size: 26px;
    color: #fff;
  }
  .result-actions{
    display:flex; gap: 10px; margin-top: 18px; flex-wrap: wrap;
  }
  .btn-secondary{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--text);
    padding: 10px 16px;
  }
  .btn-secondary:hover{ border-color: var(--gold-soft); color: var(--gold-soft); }
  .url-preview{
    margin-top: 14px;
    font-size: 12px;
    color: var(--muted);
    word-break: break-all;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 12px;
  }

  .status{
    font-size: 13px;
    color: var(--muted);
    min-height: 18px;
    margin-top: 12px;
  }
  .status.error{ color: var(--red); }

  .manual-toggle{
    background: none;
    border: none;
    color: var(--muted);
    font-size: 12px;
    text-decoration: underline;
    padding: 0;
    margin-top: 10px;
    font-family: 'Noto Sans JP', sans-serif;
  }
  .manual-toggle:hover{ color: var(--gold-soft); }
  .manual-box{ display:none; margin-top: 12px; }
  .manual-box.show{ display:block; }
  .manual-box input{
    width: 100%;
    margin-bottom: 10px;
  }

  .mode-tabs{
    display:flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .mode-tab{
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--muted);
    padding: 11px 10px;
    border-radius: 12px;
    font-family: 'Zen Maru Gothic', sans-serif;
    font-weight: 700;
    font-size: 14px;
  }
  .mode-tab.active{
    background: linear-gradient(180deg, var(--gold-soft), var(--gold));
    color: #241a03;
    border-color: transparent;
  }
  .category-tag{
    display: inline-block;
    font-size: 11px;
    color: var(--gold-soft);
    background: rgba(240,180,41,0.12);
    border: 1px solid rgba(240,180,41,0.3);
    padding: 3px 9px;
    border-radius: 999px;
    margin-bottom: 6px;
  }

  footer{
    text-align:center;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.8;
    margin-top: 30px;
  }
  footer a{ color: var(--gold-soft); }

  @media (prefers-reduced-motion: reduce){
    .result.show{ animation: none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="eyebrow"><span class="ball"></span>POKÉMON CARD EN SEARCH</span>
    <h1>日本語で入力して<br>英語版カードを探す</h1>
    <p class="lead">ポケモンの名前を日本語で入力すると英語名に変換し、asia.pokemon-card.com の英語版カード検索結果を新しいタブで開きます。</p>
  </header>

  <div class="mode-tabs">
    <button class="mode-tab active" id="tab-pokemon" type="button">ポケモン</button>
    <button class="mode-tab" id="tab-trainer" type="button">トレーナーズ</button>
  </div>

  <div class="panel">
    <label for="ja-input" id="input-label">ポケモンの名前（日本語）</label>
    <div class="search-row">
      <input type="text" id="ja-input" placeholder="例：ピカチュウ" autocomplete="off">
      <button class="btn-primary" id="search-btn">検索</button>
    </div>
    <div class="status" id="status"></div>
    <button class="manual-toggle" id="manual-toggle" type="button">英語名を自分で入力する</button>
    <div class="manual-box" id="manual-box">
      <input type="text" id="manual-input" placeholder="例：Pikachu">
      <button class="btn-secondary" id="manual-search-btn" type="button">この英語名で検索結果を開く</button>
    </div>
    <div class="chips" id="history-chips"></div>
  </div>

  <div class="result" id="result">
    <div class="result-inner">
      <div class="result-row">
        <div>
          <div class="category-tag" id="result-category" style="display:none;"></div>
          <div class="lang-tag">JAPANESE → ENGLISH</div>
          <div class="ja-name" id="result-ja"></div>
        </div>
        <div class="arrow">→</div>
        <div>
          <div class="lang-tag">CARD SEARCH KEYWORD</div>
          <div class="en-name" id="result-en"></div>
        </div>
      </div>
      <div class="result-actions">
        <button class="btn-primary" id="open-btn">検索結果を開く ↗</button>
        <button class="btn-secondary" id="copy-btn">英語名をコピー</button>
      </div>
      <div class="url-preview" id="url-preview"></div>
    </div>
  </div>

  <footer>
    検索元：<a href="https://asia.pokemon-card.com/sg/card-search/list/" target="_blank" rel="noopener">asia.pokemon-card.com</a><br>
    翻訳は PokéAPI の公式データ（全ポケモン分の日本語⇄英語名）を初回アクセス時に読み込んで使用しています。サイト側の仕様変更により、結果が正しく絞り込まれない場合があります。
  </footer>
</div>

// TCG suffixes that can appear directly appended to a Pokémon's Japanese name
// (e.g. "ピカチュウex", "リザードンVSTAR"). These are stripped before lookup
// and reattached to the translated English name.
const CARD_SUFFIXES = ["VMAX","VSTAR","GX","EX","ex","V-UNION","V","BREAK"];

function splitSuffix(jaName){
  for (const suf of CARD_SUFFIXES){
    if (jaName.endsWith(suf) && jaName.length > suf.length){
      return { base: jaName.slice(0, jaName.length - suf.length).trim(), suffix: suf };
    }
  }
  return { base: jaName, suffix: '' };
}

// --- Trainer card dictionary --------------------------------------------

// --- Full dictionary loader -------------------------------------------
// Instead of hand-typing all ~1,025+ Pokémon, we fetch PokéAPI's own
// complete species-name dataset once and build a full ja→en dictionary
// from it. LOCAL_DICT above still gives instant results before this
// finishes loading (or if it fails), so search always works immediately
// for common Pokémon.
const FULL_DICT = {};
let fullDictStatus = 'idle'; // idle | loading | ready | failed
let fullDictPromise = null;

const SPECIES_NAMES_CSV_URL =
  'https://raw.githubusercontent.com/PokeAPI/pokeapi/master/data/v2/csv/pokemon_species_names.csv';
const JA_LANGUAGE_ID = '1'; // ja-Hrkt
const EN_LANGUAGE_ID = '9'; // en

function parseCsvLine(line){
  const result = [];
  let cur = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++){
    const ch = line[i];
    if (inQuotes){
      if (ch === '"'){
        if (line[i + 1] === '"'){ cur += '"'; i++; }
        else inQuotes = false;
      } else cur += ch;
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ','){ result.push(cur); cur = ''; }
      else cur += ch;
    }
  }
  result.push(cur);
  return result;
}

async function loadFullDictionary(){
  if (fullDictPromise) return fullDictPromise;
  fullDictStatus = 'loading';
  fullDictPromise = (async () => {
    const res = await fetch(SPECIES_NAMES_CSV_URL);
    if (!res.ok) throw new Error('csv fetch failed: ' + res.status);
    const text = await res.text();
    const lines = text.split('\n').filter(l => l.trim().length > 0);
    const header = parseCsvLine(lines[0]);
    const idxSpecies = header.indexOf('pokemon_species_id');
    const idxLang = header.indexOf('local_language_id');
    const idxName = header.indexOf('name');
    if (idxSpecies === -1 || idxLang === -1 || idxName === -1){
      throw new Error('unexpected csv format');
    }

    const jaBySpecies = {};
    const enBySpecies = {};
    for (let i = 1; i < lines.length; i++){
      const cols = parseCsvLine(lines[i]);
      const speciesId = cols[idxSpecies];
      const langId = cols[idxLang];
      const name = cols[idxName];
      if (langId === JA_LANGUAGE_ID) jaBySpecies[speciesId] = name;
      else if (langId === EN_LANGUAGE_ID) enBySpecies[speciesId] = name;
    }

    let count = 0;
    for (const speciesId in jaBySpecies){
      const en = enBySpecies[speciesId];
      if (en){
        FULL_DICT[jaBySpecies[speciesId]] = en;
        count++;
      }
    }
    fullDictStatus = 'ready';
    return count;
  })();

  fullDictPromise.catch(() => { fullDictStatus = 'failed'; });
  return fullDictPromise;
}

const els = {
  input: document.getElementById('ja-input'),
  inputLabel: document.getElementById('input-label'),
  searchBtn: document.getElementById('search-btn'),
  status: document.getElementById('status'),
  result: document.getElementById('result'),
  resultJa: document.getElementById('result-ja'),
  resultEn: document.getElementById('result-en'),
  resultCategory: document.getElementById('result-category'),
  openBtn: document.getElementById('open-btn'),
  copyBtn: document.getElementById('copy-btn'),
  urlPreview: document.getElementById('url-preview'),
  manualToggle: document.getElementById('manual-toggle'),
  manualBox: document.getElementById('manual-box'),
  manualInput: document.getElementById('manual-input'),
  manualSearchBtn: document.getElementById('manual-search-btn'),
  historyChips: document.getElementById('history-chips'),
  tabPokemon: document.getElementById('tab-pokemon'),
  tabTrainer: document.getElementById('tab-trainer'),
};

let history = [];
let currentEnglish = '';
let currentMode = 'pokemon'; // 'pokemon' | 'trainer'

function setMode(mode){
  currentMode = mode;
  els.tabPokemon.classList.toggle('active', mode === 'pokemon');
  els.tabTrainer.classList.toggle('active', mode === 'trainer');
  if (mode === 'pokemon'){
    els.inputLabel.textContent = 'ポケモンの名前（日本語）';
    els.input.placeholder = '例：ピカチュウ';
    els.manualInput.placeholder = '例：Pikachu';
  } else {
    els.inputLabel.textContent = 'トレーナーズカードの名前（日本語）';
    els.input.placeholder = '例：ボスの指令';
    els.manualInput.placeholder = "例：Boss's Orders";
  }
  els.input.value = '';
  els.result.classList.remove('show');
  setStatus('');
  renderHistory();
}

function buildSearchUrl(englishName){
  const base = 'https://asia.pokemon-card.com/sg/card-search/list/';
  return base + '?keyword=' + encodeURIComponent(englishName);
}

function showResult(jaName, enName, category){
  currentEnglish = enName;
  els.resultJa.textContent = jaName;
  els.resultEn.textContent = enName;
  els.urlPreview.textContent = buildSearchUrl(enName);
  if (category){
    els.resultCategory.textContent = category;
    els.resultCategory.style.display = 'inline-block';
  } else {
    els.resultCategory.style.display = 'none';
  }
  els.result.classList.add('show');
}

function setStatus(msg, isError){
  els.status.textContent = msg || '';
  els.status.classList.toggle('error', !!isError);
}

function addHistory(jaName, enName, category){
  history = history.filter(h => !(h.ja === jaName && h.mode === currentMode));
  history.unshift({ja: jaName, en: enName, mode: currentMode, category: category || ''});
  history = history.slice(0, 40);
  renderHistory();
}

function renderHistory(){
  els.historyChips.innerHTML = '';
  history
    .filter(h => h.mode === currentMode)
    .slice(0, 8)
    .forEach(h => {
      const chip = document.createElement('button');
      chip.type = 'button';
      chip.className = 'chip';
      chip.textContent = h.ja + ' → ' + h.en;
      chip.addEventListener('click', () => {
        els.input.value = h.ja;
        showResult(h.ja, h.en, h.category);
        setStatus('');
      });
      els.historyChips.appendChild(chip);
    });
}

// Query PokéAPI's GraphQL beta endpoint: Japanese name -> species id -> English name
async function translateViaApi(jaName){
  const endpoint = 'https://beta.pokeapi.co/graphql/v1beta';

  const idQuery = `
    query getId($name: String!) {
      pokemon_v2_pokemonspeciesname(
        where: {name: {_eq: $name}, pokemon_v2_language: {name: {_eq: "ja-Hrkt"}}}
      ) {
        pokemon_species_id
      }
    }`;

  const idRes = await fetch(endpoint, {
    method: 'POST',
    headers: {'content-type': 'application/json'},
    body: JSON.stringify({query: idQuery, variables: {name: jaName}})
  });
  if (!idRes.ok) throw new Error('network');
  const idJson = await idRes.json();
  const match = idJson && idJson.data && idJson.data.pokemon_v2_pokemonspeciesname;
  if (!match || match.length === 0) return null;
  const speciesId = match[0].pokemon_species_id;

  const nameQuery = `
    query getEnglish($id: Int!) {
      pokemon_v2_pokemonspeciesname(
        where: {pokemon_species_id: {_eq: $id}, pokemon_v2_language: {name: {_eq: "en"}}}
      ) {
        name
      }
    }`;

  const nameRes = await fetch(endpoint, {
    method: 'POST',
    headers: {'content-type': 'application/json'},
    body: JSON.stringify({query: nameQuery, variables: {id: speciesId}})
  });
  if (!nameRes.ok) throw new Error('network');
  const nameJson = await nameRes.json();
  const enMatch = nameJson && nameJson.data && nameJson.data.pokemon_v2_pokemonspeciesname;
  if (!enMatch || enMatch.length === 0) return null;
  return enMatch[0].name;
}

function toTitleCase(s){
  return s.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.slice(1).toLowerCase());
}

// Finds the best dictionary match for a given input. Tries an exact match
// first; if none, looks for the longest dictionary key that appears
// *inside* the input (e.g. "リーリエの決心" contains the key "リーリエ").
// This lets the site's own keyword search surface related cards like
// "Lillie's Determination" from just the base name "Lillie".
function findBestMatch(input, dicts){
  for (const dict of dicts){
    if (dict[input] !== undefined) return { value: dict[input], matchedKey: input, partial: false };
  }
  let best = null;
  for (const dict of dicts){
    for (const key in dict){
      if (key.length < 2) continue;
      const inputContainsKey = input.includes(key);
      const keyContainsInput = input.length >= 2 && key.includes(input);
      if (inputContainsKey || keyContainsInput){
        // Prefer the closest-length match (most specific overlap) among candidates.
        const score = Math.min(key.length, input.length);
        if (!best || score > best.score){
          best = { value: dict[key], matchedKey: key, partial: true, score };
        }
      }
    }
  }
  return best;
}

async function handleSearch(){
  if (currentMode === 'trainer') return handleTrainerSearch();
  return handlePokemonSearch();
}

async function handlePokemonSearch(){
  const jaName = els.input.value.trim();
  if (!jaName){
    setStatus('ポケモンの名前を入力してください', true);
    return;
  }

  els.searchBtn.disabled = true;
  setStatus('検索中…');
  els.result.classList.remove('show');

  try{
    const { base, suffix } = splitSuffix(jaName);

    let match = findBestMatch(jaName, [LOCAL_DICT, FULL_DICT]) || findBestMatch(base, [LOCAL_DICT, FULL_DICT]);
    let enBase = match ? match.value : null;

    if (!enBase && fullDictStatus !== 'failed'){
      if (fullDictStatus !== 'ready'){
        setStatus('辞書を読み込み中…（初回のみ数秒かかります）');
      }
      try{
        await loadFullDictionary();
        match = findBestMatch(jaName, [FULL_DICT]) || findBestMatch(base, [FULL_DICT]);
        enBase = match ? match.value : null;
      }catch(e){ /* fall through to API lookup below */ }
    }

    if (!enBase){
      setStatus('検索中…');
      enBase = await translateViaApi(base);
    }

    if (!enBase){
      setStatus('英語名が見つかりませんでした。「英語名を自分で入力する」からお試しください。', true);
      els.searchBtn.disabled = false;
      return;
    }

    enBase = toTitleCase(enBase);
    const enName = suffix ? (enBase + ' ' + suffix) : enBase;
    showResult(jaName, enName);
    addHistory(jaName, enName);
    setStatus(match && match.partial
      ? '「' + match.matchedKey + '」に一致しました。関連カードもまとめて検索します。'
      : '見つかりました！「検索結果を開く」を押してください。');
    window.open(buildSearchUrl(enName), '_blank', 'noopener');
  }catch(err){
    setStatus('翻訳中にエラーが発生しました。「英語名を自分で入力する」からお試しください。', true);
  }finally{
    els.searchBtn.disabled = false;
  }
}

async function handleTrainerSearch(){
  const jaName = els.input.value.trim();
  if (!jaName){
    setStatus('トレーナーズカードの名前を入力してください', true);
    return;
  }

  els.searchBtn.disabled = true;
  setStatus('検索中…');
  els.result.classList.remove('show');

  const match = findBestMatch(jaName, [TRAINER_DICT]);

  if (!match){
    setStatus('辞書にまだ登録されていないカードです。「英語名を自分で入力する」からお試しください（この名前は教えてもらえれば辞書に追加できます）。', true);
    els.searchBtn.disabled = false;
    return;
  }

  const entry = match.value;
  showResult(jaName, entry.en, entry.type);
  addHistory(jaName, entry.en, entry.type);
  setStatus(match.partial
    ? '「' + match.matchedKey + '」に一致しました。関連カードもまとめて検索します。'
    : '見つかりました！「検索結果を開く」を押してください。');
  window.open(buildSearchUrl(entry.en), '_blank', 'noopener');
  els.searchBtn.disabled = false;
}

// Start loading the full ja→en dictionary in the background as soon as the
// page opens, so most searches hit an already-warm cache.
loadFullDictionary().catch(() => { /* silent: LOCAL_DICT / API fallback still work */ });

els.searchBtn.addEventListener('click', handleSearch);
els.input.addEventListener('keydown', e => { if (e.key === 'Enter') handleSearch(); });

els.openBtn.addEventListener('click', () => {
  if (currentEnglish) window.open(buildSearchUrl(currentEnglish), '_blank', 'noopener');
});

els.copyBtn.addEventListener('click', async () => {
  if (!currentEnglish) return;
  try{
    await navigator.clipboard.writeText(currentEnglish);
    setStatus('英語名をコピーしました：' + currentEnglish);
  }catch(e){
    setStatus('コピーできませんでした。手動で選択してください。', true);
  }
});

els.manualToggle.addEventListener('click', () => {
  els.manualBox.classList.toggle('show');
});

els.manualSearchBtn.addEventListener('click', () => {
  const enName = els.manualInput.value.trim();
  if (!enName){
    setStatus('英語名を入力してください', true);
    return;
  }
  showResult(els.input.value.trim() || '(手動入力)', enName, null);
  window.open(buildSearchUrl(enName), '_blank', 'noopener');
  setStatus('');
});

els.tabPokemon.addEventListener('click', () => setMode('pokemon'));
els.tabTrainer.addEventListener('click', () => setMode('trainer'));
</script>
